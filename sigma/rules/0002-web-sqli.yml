title: Web SQL Injection Pattern in Access Log
id: el34-0002-web-sqli
status: experimental
description: Apache/ModSec 접근 로그에서 전형적인 SQLi 패턴 — union select / or 1=1 등
logsource:
    product: apache
    category: webserver
detection:
    selection:
        keywords:
            - 'union select'
            - 'OR 1=1'
            - "' OR '"
            - 'information_schema'
            - 'sleep('
    condition: selection
level: high
tags:
    - attack.initial_access
    - attack.t1190
