#!/usr/sbin/nft -f
# el34 fw — edge router firewall (ext <-> pipe).
# docker NAT 룰 (table ip nat) 은 보존하고, 우리 정책 테이블만 정의.
# 식별자는 letter/_ 로 시작 (digit 시작은 nft 파서가 거부).

add table inet six_filter
flush table inet six_filter

table inet six_filter {
    chain input {
        type filter hook input priority 0
        policy accept
        tcp dport 22 accept
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept
        ct state established,related accept
    }

    chain forward {
        type filter hook forward priority 0
        policy accept
        ct state established,related accept
    }

    chain output {
        type filter hook output priority 0
        policy accept
    }
}

add table ip six_nat
flush table ip six_nat

table ip six_nat {
    chain prerouting {
        type nat hook prerouting priority -100
        policy accept
    }
    chain postrouting {
        type nat hook postrouting priority 100
        policy accept
    }
}
