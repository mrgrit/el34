{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2 style="margin-top:0;">📝 운영자 노트 (XSS 가능)</h2>
  <form method="POST">
    <textarea name="notes">{{me.notes}}</textarea>
    <button class="btn" type="submit">저장</button>
  </form>
</div>
<div class="card">
  <h3 style="margin-top:0;">전체 노트 (raw render)</h3>
  {% for n in all_notes %}
    <div style="border-bottom:1px solid var(--border);padding:8px 0;">
      <strong>{{n.username}}</strong>
      <div>{{n.notes|safe}}</div>
    </div>
  {% endfor %}
</div>
{% endblock %}
