{% extends "base.html" %}
{% block content %}
<div class="card" style="min-height:420px;">
  <h2 style="margin-top:0;">💬 AICompanion 대화</h2>

  <!-- 대화 중 모델 토글 -->
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;padding:8px;background:#01101a;border:1px solid var(--border);border-radius:6px;">
    <span class="muted">🧠 모델</span>
    <select id="modelsel" style="width:auto;min-width:190px;margin:0;"></select>
    <button class="btn btn-sec" type="button" onclick="loadModels()" style="padding:6px 10px;">↻ 새로고침</button>
    <span id="llmstat" class="tag">…</span>
    <a href="/admin" class="muted" style="margin-left:auto;">⚙ 서버 설정</a>
  </div>

  <!-- 시스템 프롬프트 원클릭 프리셋 (AI Safety 교안) -->
  <details id="presetbox" style="margin-bottom:10px;">
    <summary class="muted" style="cursor:pointer;">🎯 시스템 프롬프트 프리셋 (AI Safety 교안) — 클릭 시 아래 system prompt 에 로드</summary>
    <div id="presets" style="margin-top:8px;"></div>
  </details>

  <div id="thread" style="min-height:300px;max-height:60vh;overflow:auto;padding:8px;"></div>
  <hr style="border-color:var(--border);">
  <form id="cf" onsubmit="return false;">
    <textarea id="msg" placeholder="메시지를 입력하세요..." required></textarea>
    <details id="sysdetails" style="margin:6px 0 8px;">
      <summary class="muted">고급 옵션 (system prompt prefix) <span id="sysactive" class="tag" style="display:none;"></span></summary>
      <textarea id="sysadd" placeholder="(client-system) 추가 지시사항" style="margin-top:6px;min-height:50px;"></textarea>
    </details>
    <button class="btn" type="submit" onclick="send()">보내기</button>
  </form>
</div>
<script>
let curModel = null;   // 대화에 사용할 현재 모델
let backend  = 'mock';

async function loadCfg(){
  try{
    const j = await (await fetch('/api/llm/config')).json();
    const c = j.config || {};
    backend = c.backend; curModel = c.model;
    updateStat(c);
    await loadModels();
  }catch(e){ document.getElementById('llmstat').textContent = 'cfg 오류'; }
}
function updateStat(c){
  const s = document.getElementById('llmstat');
  s.textContent = (c.backend==='ollama') ? ('ollama · '+(curModel||c.model)) : 'mock (시뮬레이션)';
}
async function loadModels(){
  const sel = document.getElementById('modelsel');
  try{
    const j = await (await fetch('/api/llm/models')).json();
    sel.innerHTML='';
    if(j.ok && j.models && j.models.length){
      j.models.forEach(m=>{ const o=document.createElement('option'); o.value=m; o.textContent=m;
        if(m===curModel) o.selected=true; sel.appendChild(o); });
      if(!sel.value) sel.selectedIndex=0;
      curModel = sel.value;
    } else {
      const o=document.createElement('option');
      o.value=curModel||''; o.textContent = curModel ? curModel+' (서버 미연결)' : '(모델 없음 — ⚙ 서버 설정 필요)';
      sel.appendChild(o);
    }
  }catch(e){ /* ignore */ }
  updateStat({backend:backend});
}
document.getElementById('modelsel').addEventListener('change', e=>{
  curModel = e.target.value;                       // 대화 도중 모델 전환
  updateStat({backend:backend});
});

async function send(){
  const m = document.getElementById('msg').value.trim();
  const sys = document.getElementById('sysadd').value;
  if(!m) return;
  add('u', m);
  document.getElementById('msg').value='';
  const pend = addPending();                        // 응답 대기 표시 (느린 모델 대비)
  const payload = {message:m, system:sys};
  if(curModel) payload.model = curModel;            // 선택 모델을 이번 요청에 사용
  try{
    const r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)});
    const j = await r.json().catch(()=>({}));
    pend.remove();
    if(!r.ok){ add('a', '⚠️ 오류: ' + (j.error || j.err || ('HTTP '+r.status))); return; }
    add('a', (j.answer && j.answer.trim()) ? j.answer : '(빈 응답)', j.retrieved);
  }catch(e){
    pend.remove();
    add('a', '⚠️ 요청 실패: ' + e);
  }
}
function addPending(){
  const t = document.getElementById('thread');
  const d = document.createElement('div');
  d.className = 'bubble a'; d.textContent = '⏳ 생성 중…';
  t.appendChild(d); t.scrollTop = t.scrollHeight;
  return d;
}
function add(who, text, retrieved){
  const t = document.getElementById('thread');
  const d = document.createElement('div');
  d.className = 'bubble ' + who;
  // V08: assistant 응답을 raw HTML 로 렌더 (insecure output handling)
  if(who==='a'){
    d.innerHTML = text;
    // HTML 파싱으로 내용이 통째로 사라지면(예: <, > 가 태그로 먹힘) 원문을 그대로 표시
    if(!d.textContent.trim() && text && text.trim()) d.textContent = text;
  } else d.textContent = text;
  t.appendChild(d);
  if(retrieved && retrieved.length){
    const r = document.createElement('div');
    r.className='muted'; r.style.marginLeft='8px';
    r.textContent = '🔎 retrieved: ' + retrieved.map(x=>x.title).join(', ');
    t.appendChild(r);
  }
  t.scrollTop = t.scrollHeight;
}
// ── 시스템 프롬프트 프리셋 ──────────────────────────────
async function loadPresets(){
  let data;
  try{ data = await (await fetch('/api/presets')).json(); }catch(e){ return; }
  const wrap = document.getElementById('presets');
  const list = (data && data.presets) || [];
  if(!list.length){ wrap.innerHTML = '<span class="muted">프리셋이 없습니다.</span>'; return; }
  // 과목별 그룹
  const groups = {};
  list.forEach(p => { (groups[p.course] = groups[p.course] || []).push(p); });
  wrap.innerHTML = '';
  Object.keys(groups).sort().forEach(course => {
    const h = document.createElement('div');
    h.className = 'muted'; h.style.margin = '6px 0 4px'; h.textContent = '▸ ' + course;
    wrap.appendChild(h);
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;';
    groups[course].forEach(p => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'btn btn-sec';
      b.style.cssText = 'padding:5px 9px;font-size:12px;';
      b.textContent = (p.week ? p.week + ' · ' : '') + (p.label || p.attack_type || 'preset');
      b.title = p.system_prompt;
      b.onclick = () => applyPreset(p);
      row.appendChild(b);
    });
    wrap.appendChild(row);
  });
}
function applyPreset(p){
  const ta = document.getElementById('sysadd');
  ta.value = p.system_prompt;
  document.getElementById('sysdetails').open = true;   // 적용된 system prompt 펼쳐 보이기
  const tag = document.getElementById('sysactive');
  tag.style.display = ''; tag.textContent = '프리셋: ' + (p.label || p.week || '');
  ta.style.transition='none'; ta.style.background='#0f3a20';
  setTimeout(()=>{ ta.style.transition='background .8s'; ta.style.background=''; }, 60);
  document.getElementById('msg').focus();
}
loadCfg();
loadPresets();
</script>
{% endblock %}
