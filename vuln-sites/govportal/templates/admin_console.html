{% extends "base.html" %}
{% block content %}

<div class="card">

  <a href="/api/citizens/export.csv" class="btn">전체 시민 CSV 다운로드</a>
  <h2 style="margin-top:20px;">감사 로그 정리</h2>

</div>
{% endblock %}
