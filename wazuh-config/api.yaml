# el34 Wazuh manager API config — overrides defaults.
# Default values produce HTTP 429 (rate limit) easily even with a single student
# because dashboard + filebeat + indexer health-check polls aggregate quickly.

access:
  max_login_attempts: 100      # default 50
  block_time: 60               # default 300 (sec to stay blocked after threshold)
  max_request_per_minute: 5000 # default 300
