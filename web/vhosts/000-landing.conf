# 6v6 default landing — bare 6v6.lab + IP + 매칭되지 않는 Host 모두 응답
<VirtualHost *:80>
    ServerName 6v6.lab
    ServerAlias landing www.6v6.lab _default_
    DocumentRoot /var/www/landing

    <Directory /var/www/landing>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/landing_error.log
    CustomLog ${APACHE_LOG_DIR}/landing_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName 6v6.lab
    ServerAlias landing www.6v6.lab _default_
    DocumentRoot /var/www/landing

    SSLEngine on
    SSLCertificateFile      /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile   /etc/apache2/ssl/server.key

    <Directory /var/www/landing>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/landing_tls_error.log
    CustomLog ${APACHE_LOG_DIR}/landing_tls_access.log combined
</VirtualHost>
