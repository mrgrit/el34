# el34 vhost — govportal.el34.lab → govportal:3002 (Apache + ModSecurity 검사 후 ProxyPass)
<VirtualHost *:80>
    ServerName govportal.el34.lab

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://govportal:3002/socket.io/
    ProxyPassReverse /socket.io/ ws://govportal:3002/socket.io/
    ProxyPass / http://govportal:3002/
    ProxyPassReverse / http://govportal:3002/

    ErrorLog ${APACHE_LOG_DIR}/govportal_error.log
    CustomLog ${APACHE_LOG_DIR}/govportal_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName govportal.el34.lab
    SSLEngine on
    SSLCertificateFile      /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile   /etc/apache2/ssl/server.key

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://govportal:3002/socket.io/
    ProxyPassReverse /socket.io/ ws://govportal:3002/socket.io/
    ProxyPass / http://govportal:3002/
    ProxyPassReverse / http://govportal:3002/

    ErrorLog ${APACHE_LOG_DIR}/govportal_tls_error.log
    CustomLog ${APACHE_LOG_DIR}/govportal_tls_access.log combined
</VirtualHost>
