# el34 vhost — dvwa.el34.lab → dvwa:80 (Apache + ModSecurity 검사 후 ProxyPass)
<VirtualHost *:80>
    ServerName dvwa.el34.lab

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://dvwa:80/socket.io/
    ProxyPassReverse /socket.io/ ws://dvwa:80/socket.io/
    ProxyPass / http://dvwa:80/
    ProxyPassReverse / http://dvwa:80/

    ErrorLog ${APACHE_LOG_DIR}/dvwa_error.log
    CustomLog ${APACHE_LOG_DIR}/dvwa_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName dvwa.el34.lab
    SSLEngine on
    SSLCertificateFile      /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile   /etc/apache2/ssl/server.key

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://dvwa:80/socket.io/
    ProxyPassReverse /socket.io/ ws://dvwa:80/socket.io/
    ProxyPass / http://dvwa:80/
    ProxyPassReverse / http://dvwa:80/

    ErrorLog ${APACHE_LOG_DIR}/dvwa_tls_error.log
    CustomLog ${APACHE_LOG_DIR}/dvwa_tls_access.log combined
</VirtualHost>
