# el34 vhost — neobank.el34.lab → neobank:3001 (Apache + ModSecurity 검사 후 ProxyPass)
<VirtualHost *:80>
    ServerName neobank.el34.lab

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://neobank:3001/socket.io/
    ProxyPassReverse /socket.io/ ws://neobank:3001/socket.io/
    ProxyPass / http://neobank:3001/
    ProxyPassReverse / http://neobank:3001/

    ErrorLog ${APACHE_LOG_DIR}/neobank_error.log
    CustomLog ${APACHE_LOG_DIR}/neobank_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName neobank.el34.lab
    SSLEngine on
    SSLCertificateFile      /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile   /etc/apache2/ssl/server.key

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://neobank:3001/socket.io/
    ProxyPassReverse /socket.io/ ws://neobank:3001/socket.io/
    ProxyPass / http://neobank:3001/
    ProxyPassReverse / http://neobank:3001/

    ErrorLog ${APACHE_LOG_DIR}/neobank_tls_error.log
    CustomLog ${APACHE_LOG_DIR}/neobank_tls_access.log combined
</VirtualHost>
