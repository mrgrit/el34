# el34 vhost — ai.el34.lab → aicompanion:3005 (Apache + ModSecurity 검사 후 ProxyPass)
<VirtualHost *:80>
    ServerName ai.el34.lab

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://aicompanion:3005/socket.io/
    ProxyPassReverse /socket.io/ ws://aicompanion:3005/socket.io/
    ProxyPass / http://aicompanion:3005/
    ProxyPassReverse / http://aicompanion:3005/

    # per-vhost ModSec — ai 는 DetectionOnly (LLM 프롬프트 인젝션 시연용).
    # 로그/페이로드에 SQLi·인젝션 문자열이 들어와도 WAF 가 차단(403)하지 않고
    # 모델까지 전달되어야 "모델 공격 성공"을 시연할 수 있다. 탐지 로그는 계속 남음.
    SecRuleEngine DetectionOnly

    ErrorLog ${APACHE_LOG_DIR}/ai_error.log
    CustomLog ${APACHE_LOG_DIR}/ai_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName ai.el34.lab
    SSLEngine on
    SSLCertificateFile      /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile   /etc/apache2/ssl/server.key

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://aicompanion:3005/socket.io/
    ProxyPassReverse /socket.io/ ws://aicompanion:3005/socket.io/
    ProxyPass / http://aicompanion:3005/
    ProxyPassReverse / http://aicompanion:3005/

    # per-vhost ModSec — ai 는 DetectionOnly (LLM 프롬프트 인젝션 시연용).
    # 로그/페이로드에 SQLi·인젝션 문자열이 들어와도 WAF 가 차단(403)하지 않고
    # 모델까지 전달되어야 "모델 공격 성공"을 시연할 수 있다. 탐지 로그는 계속 남음.
    SecRuleEngine DetectionOnly

    ErrorLog ${APACHE_LOG_DIR}/ai_tls_error.log
    CustomLog ${APACHE_LOG_DIR}/ai_tls_access.log combined
</VirtualHost>
