# el34 vhost — portal.el34.lab → portal:8000 (관리 도구 — ModSecurity 통과)
<VirtualHost *:80>
    ServerName portal.el34.lab

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://portal:8000/
    ProxyPassReverse / http://portal:8000/

    ErrorLog ${APACHE_LOG_DIR}/portal_error.log
    CustomLog ${APACHE_LOG_DIR}/portal_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName portal.el34.lab
    SSLEngine on
    SSLCertificateFile      /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile   /etc/apache2/ssl/server.key

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://portal:8000/
    ProxyPassReverse / http://portal:8000/

    ErrorLog ${APACHE_LOG_DIR}/portal_tls_error.log
    CustomLog ${APACHE_LOG_DIR}/portal_tls_access.log combined
</VirtualHost>
