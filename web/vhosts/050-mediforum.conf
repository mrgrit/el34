# 6v6 vhost — mediforum.6v6.lab → mediforum:3003 (Apache + ModSecurity 검사 후 ProxyPass)
<VirtualHost *:80>
    ServerName mediforum.6v6.lab

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://mediforum:3003/socket.io/
    ProxyPassReverse /socket.io/ ws://mediforum:3003/socket.io/
    ProxyPass / http://mediforum:3003/
    ProxyPassReverse / http://mediforum:3003/

    ErrorLog ${APACHE_LOG_DIR}/mediforum_error.log
    CustomLog ${APACHE_LOG_DIR}/mediforum_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName mediforum.6v6.lab
    SSLEngine on
    SSLCertificateFile      /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile   /etc/apache2/ssl/server.key

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://mediforum:3003/socket.io/
    ProxyPassReverse /socket.io/ ws://mediforum:3003/socket.io/
    ProxyPass / http://mediforum:3003/
    ProxyPassReverse / http://mediforum:3003/

    ErrorLog ${APACHE_LOG_DIR}/mediforum_tls_error.log
    CustomLog ${APACHE_LOG_DIR}/mediforum_tls_access.log combined
</VirtualHost>
