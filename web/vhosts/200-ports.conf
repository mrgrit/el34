# el34 포트분기 vhost — .161:800X → 사이트 (Host 헤더 불필요, fw DNAT 가 800X 를 web 으로 전달).
# Host-header(:80) vhost 와 병행 — 둘 다 동일 백엔드/ModSec 정책. 출처 IP 는 fw/ips 라우팅으로 보존.
Listen 8001
Listen 8002
Listen 8003
Listen 8004
Listen 8005
Listen 8006
Listen 8007

# 8001 — juiceshop (W02/W03 학습용 DetectionOnly)
<VirtualHost *:8001>
    ServerName juice.el34.lab
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://juiceshop:3000/socket.io/
    ProxyPassReverse /socket.io/ ws://juiceshop:3000/socket.io/
    ProxyPass / http://juiceshop:3000/
    ProxyPassReverse / http://juiceshop:3000/
    SecRuleEngine DetectionOnly
    ErrorLog ${APACHE_LOG_DIR}/juice_port_error.log
    CustomLog ${APACHE_LOG_DIR}/juice_port_access.log combined
</VirtualHost>

