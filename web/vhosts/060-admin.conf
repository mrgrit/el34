# el34 vhost — admin.el34.lab → adminconsole:3004 (Apache + ModSecurity 검사 후 ProxyPass)
<VirtualHost *:80>
    ServerName admin.el34.lab

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://adminconsole:3004/socket.io/
    ProxyPassReverse /socket.io/ ws://adminconsole:3004/socket.io/
    ProxyPass / http://adminconsole:3004/
    ProxyPassReverse / http://adminconsole:3004/

    ErrorLog ${APACHE_LOG_DIR}/admin_error.log
    CustomLog ${APACHE_LOG_DIR}/admin_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName admin.el34.lab
    SSLEngine on
    SSLCertificateFile      /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile   /etc/apache2/ssl/server.key

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /socket.io/ ws://adminconsole:3004/socket.io/
    ProxyPassReverse /socket.io/ ws://adminconsole:3004/socket.io/
    ProxyPass / http://adminconsole:3004/
    ProxyPassReverse / http://adminconsole:3004/

    ErrorLog ${APACHE_LOG_DIR}/admin_tls_error.log
    CustomLog ${APACHE_LOG_DIR}/admin_tls_access.log combined
</VirtualHost>
