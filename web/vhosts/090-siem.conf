# 6v6 vhost — siem.6v6.lab -> wazuh-dashboard:5601 (HTTPS, real Wazuh)
# Wazuh dashboard listens on self-signed TLS 5601 - Apache proxies via https.
<VirtualHost *:80>
    ServerName siem.6v6.lab

    SSLProxyEngine On
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    SSLProxyVerify none

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / https://wazuh-dashboard:5601/
    ProxyPassReverse / https://wazuh-dashboard:5601/

    RequestHeader set X-Forwarded-Proto "http"

    ErrorLog ${APACHE_LOG_DIR}/siem_error.log
    CustomLog ${APACHE_LOG_DIR}/siem_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName siem.6v6.lab
    SSLEngine on
    SSLCertificateFile      /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile   /etc/apache2/ssl/server.key

    SSLProxyEngine On
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    SSLProxyVerify none

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / https://wazuh-dashboard:5601/
    ProxyPassReverse / https://wazuh-dashboard:5601/

    RequestHeader set X-Forwarded-Proto "https"

    ErrorLog ${APACHE_LOG_DIR}/siem_tls_error.log
    CustomLog ${APACHE_LOG_DIR}/siem_tls_access.log combined
</VirtualHost>
