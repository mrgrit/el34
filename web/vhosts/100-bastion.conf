# el34 vhost — bastion.el34.lab → bastion:9100 (관리 도구 — ModSecurity 통과)
<VirtualHost *:80>
    ServerName bastion.el34.lab

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://bastion:9100/
    ProxyPassReverse / http://bastion:9100/

    ErrorLog ${APACHE_LOG_DIR}/bastion_error.log
    CustomLog ${APACHE_LOG_DIR}/bastion_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName bastion.el34.lab
    SSLEngine on
    SSLCertificateFile      /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile   /etc/apache2/ssl/server.key

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://bastion:9100/
    ProxyPassReverse / http://bastion:9100/

    ErrorLog ${APACHE_LOG_DIR}/bastion_tls_error.log
    CustomLog ${APACHE_LOG_DIR}/bastion_tls_access.log combined
</VirtualHost>
